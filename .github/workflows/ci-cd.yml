name: CI/CD Pipeline - Urban Style Store

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Test & Lint PHP Code
  lint:
    name: Code Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mysqli

      - name: Validate PHP Syntax (php -l)
        run: |
          find . -name "*.php" -exec php -l {} \;

  # Job 2: Build & Validate Docker Configuration
  docker-build:
    name: Build & Validate Docker Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image (Verify Dockerfile Compile)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false # Validate build without uploading image to repository registry
          tags: urban-style-store:latest
